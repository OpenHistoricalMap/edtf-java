# Canonical English source strings for edtf-java's localised
# formatter. Translations are managed via Transifex (see .tx/config);
# do not edit messages_<locale>.properties files by hand.
#
# Placeholder syntax follows java.text.MessageFormat: {0}, {1}, etc.
# Keep keys stable across releases; renaming a key is a breaking
# change for downstream translators.

# ----- Whole-date qualifiers (L1) -----
# Trailing "?" -> uncertain. The placeholder is the rendered date.
qualifier.uncertain   = {0} (uncertain)
# Trailing "~" -> approximate.
qualifier.approximate = circa {0}
# Trailing "%" -> both uncertain and approximate.
qualifier.mixed       = circa {0} (uncertain)

# ----- Decade (e.g., 199 -> "the 1990s") -----
decade = the {0}s

# ----- Century (e.g., 20 -> "the 2000s") -----
century = the {0}s

# ----- Year-only (e.g., 2020 -> "2020", -44 -> "44 BCE") -----
year.ce  = {0}
year.bce = {0} BCE

# Y-notation overflow / large years (e.g., Y100000 -> "Year 100,000")
year.large = Year {0}

# ----- Seasons (codes 21-24, calendar quarters) -----
season.21 = Q1 {0}
season.22 = Q2 {0}
season.23 = Q3 {0}
season.24 = Q4 {0}

# ----- Intervals -----
interval.bounded     = {0} to {1}
interval.openLower   = before {0}
interval.openUpper   = {0} onwards
interval.openBoth    = any time
interval.unknownLower = up to {0}
interval.unknownUpper = from {0}

# ----- Sets / Lists -----
# Sets: alternatives ("one of these")
set.empty   = (empty set)
set.one     = {0}
set.two     = {0} or {1}
set.many    = one of: {0}
# Lists: enumerations ("all of these")
list.empty  = (empty list)
list.one    = {0}
list.two    = {0} and {1}
list.many   = {0}

# Generic placeholder for forms the formatter doesn't yet handle
# specially; falls back to the canonical EDTF string.
fallback = {0}
