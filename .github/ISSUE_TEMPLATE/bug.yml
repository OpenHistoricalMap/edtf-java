name: Bug report
description: Report incorrect parsing, rendering, or comparison behavior
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: input
    id: input-string
    attributes:
      label: EDTF input string
      description: The exact input passed to `Edtf.parse(...)` (or similar).
      placeholder: "2020-XX?"

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen? Cite the ISO 8601-2 clause or LoC EDTF section if relevant.

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happens instead? Include exception text and stack traces where possible.

  - type: input
    id: version
    attributes:
      label: edtf-java version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java runtime
      placeholder: "Temurin 17.0.9 on Ubuntu 22.04"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps us reproduce the bug.
