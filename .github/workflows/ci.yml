name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt every JavaScript-based action into Node.js 24 ahead of the
# 2026-06-02 default flip. The two actions used here (checkout,
# setup-java) honour this env var.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      - name: Javadoc check
        if: matrix.java == '17'
        run: mvn -B -ntp javadoc:javadoc
